<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <link rel="icon" type="image/png" href="./src/assets/title.png" />
  <!-- Google Fonts & Material Symbols -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <!-- Tailwind CSS Play CDN (since the user wrote Tailwind classes but Tailwind is not installed) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: '#fbfdfd',
            'inverse-surface': '#2f3032',
            'surface-container': '#f0f4f4',
            'surface-container-lowest': '#ffffff',
            'surface-container-high': '#e3e8e8',
            'on-surface': '#191c1d',
            'inverse-on-surface': '#eff1f1',
            'on-surface-variant': '#3f484a',
            'surface-variant': '#dbe4e6',
            'inverse-primary': '#5cdbe6',
            primary: '#006a72',
            'primary-container': '#e0f7fa',
            outline: '#70797b',
            'outline-variant': '#bfc8ca',
            error: '#ba1a1a',
            'error-container': '#ffdad6',
            tertiary: '#4a6267',
            'tertiary-container': '#cde7ec',
          }
        }
      }
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
